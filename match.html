<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NLR Summit — Match</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--s:#fff;--s2:#f0efe9;--b:rgba(0,0,0,.1);--bs:rgba(0,0,0,.18);--t:#1a1a18;--t2:#5a5a52;--t3:#9a9a8e;--a:#1a4a2e;--al:#e8f2ec;--am:#c4720a;--aml:#fdf0dc;--pu:#5040a0;--pul:#eeeaf8;--re:#b83030;--rel:#fdeaea;--gr:#1a6632;--grl:#e6f4eb;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden;}
.shell{width:100%;max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
@media(min-width:768px){body{background:#dddcd6;display:flex;align-items:center;justify-content:center;}
.shell{width:390px;height:844px;max-width:390px;border-radius:44px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.28),0 4px 20px rgba(0,0,0,.15);}}

/* HEADER */
.hdr{background:var(--a);padding:16px 20px 14px;flex-shrink:0;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:20px;font-weight:600;color:#fff;}
.hdr-sub{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:3px;}
.hav{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer;overflow:hidden;flex-shrink:0;text-decoration:none;}
.hav img{width:100%;height:100%;object-fit:cover;}

/* BOTTOM NAV */
.bnav{background:var(--s);border-top:1px solid var(--b);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:50;}
.nb,.nb:visited{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:'DM Sans',sans-serif;text-decoration:none;}
.nb.on{color:var(--a);}
.nb span{font-size:10px;font-weight:500;}

/* FILTER BAR */
.fbar{background:var(--s);border-bottom:1px solid var(--b);padding:10px 16px;flex-shrink:0;}
.fbar-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.fbar-row::-webkit-scrollbar{display:none;}
.fc{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bs);background:var(--s2);color:var(--t2);transition:all .15s;}
.fc.on{background:var(--a);border-color:var(--a);color:#fff;}

/* CARD STACK AREA */
.stack-area{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 8px;position:relative;overflow:hidden;z-index:1;}

/* SWIPE HINT LABELS */
.hint-no{position:absolute;top:36px;left:24px;font-size:22px;font-weight:600;color:var(--re);border:3px solid var(--re);border-radius:8px;padding:4px 12px;opacity:0;transform:rotate(-15deg);pointer-events:none;z-index:20;font-family:'DM Mono',monospace;}
.hint-yes{position:absolute;top:36px;right:24px;font-size:22px;font-weight:600;color:var(--gr);border:3px solid var(--gr);border-radius:8px;padding:4px 12px;opacity:0;transform:rotate(15deg);pointer-events:none;z-index:20;font-family:'DM Mono',monospace;}
.hint-super{position:absolute;top:36px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:600;color:#185FA5;border:3px solid #185FA5;border-radius:8px;padding:4px 12px;opacity:0;pointer-events:none;z-index:20;font-family:'DM Mono',monospace;}

/* MATCH SCORE BADGE */
.score-badge{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;z-index:5;}

/* CARD */
.card{position:absolute;width:calc(100% - 32px);max-width:340px;background:var(--s);border-radius:20px;border:1px solid var(--b);box-shadow:0 4px 24px rgba(0,0,0,.12);cursor:grab;user-select:none;transform-origin:center bottom;transition:box-shadow .2s;overflow:hidden;}
.card:active{cursor:grabbing;}
.card.animating{transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;pointer-events:none;}

.card-photo{width:100%;aspect-ratio:1/1;max-height:220px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;}
.card-photo img{width:100%;height:100%;object-fit:cover;}
.card-initials{font-size:52px;font-weight:600;}

.card-body{padding:14px 16px 16px;}
.card-name{font-size:19px;font-weight:600;color:var(--t);}
.card-title{font-size:13px;color:var(--t2);margin-top:2px;}
.card-org{font-size:13px;color:var(--t2);}
.card-type{display:inline-block;font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;background:var(--al);color:var(--a);margin-top:8px;font-weight:500;}
.card-sectors{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.cs{font-size:11px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;background:var(--s2);color:var(--t2);border:1px solid var(--b);}
.card-bio{font-size:13px;color:var(--t2);margin-top:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-match{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b);}
.match-label{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;}
.match-bars{display:flex;gap:3px;}
.mbar{width:18px;height:6px;border-radius:3px;background:var(--s2);}
.mbar.on{background:var(--a);}

/* ACTION BUTTONS */
.actions{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 16px 8px;flex-shrink:0;position:relative;z-index:10;}
.act-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.act-btn:active{transform:scale(.92);}
.btn-no{background:var(--rel);color:var(--re);}
.btn-super{width:44px;height:44px;background:#E6F1FB;color:#185FA5;}
.btn-yes{background:var(--grl);color:var(--gr);}

/* STACK COUNTER */
.stack-info{text-align:center;font-size:12px;color:var(--t3);font-family:'DM Mono',monospace;padding:4px 0 6px;flex-shrink:0;}

/* EMPTY */
.stack-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;padding:24px;}
.stack-empty svg{opacity:.25;}
.stack-empty h3{font-size:17px;font-weight:600;color:var(--t);}
.stack-empty p{font-size:13px;color:var(--t3);text-align:center;line-height:1.5;}
.reset-btn{padding:11px 24px;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}

/* MATCH MODAL */
.match-modal{display:none;position:absolute;inset:0;background:rgba(26,74,46,.92);z-index:500;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:0;pointer-events:none;}
.match-modal.on{display:flex;pointer-events:all;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.match-top{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 24px 14px;flex-shrink:0;}
.match-top h2{font-size:26px;font-weight:600;color:#fff;text-align:center;}
.match-top p{font-size:14px;color:rgba(255,255,255,.75);text-align:center;line-height:1.5;}
.match-avatars{display:flex;align-items:center;gap:12px;}
.match-av{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;overflow:hidden;}
.match-av img{width:100%;height:100%;object-fit:cover;}
.match-icon{font-size:32px;display:flex;align-items:center;}
/* Profile sheet inside match modal */
.mprofile{background:var(--s);border-radius:24px 24px 0 0;width:100%;height:60%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mph{padding:16px 18px 12px;border-bottom:1px solid var(--b);}.mph-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.mph-av{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0;overflow:hidden;}
.mph-av img{width:100%;height:100%;object-fit:cover;}
.mph-name{font-size:17px;font-weight:600;color:var(--t);}
.mph-title{font-size:13px;color:var(--t2);margin-top:1px;}
.mph-org{font-size:13px;color:var(--t2);}
.mph-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.mph-type{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;background:var(--al);color:var(--a);font-weight:500;}
.mph-sec{font-size:11px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;background:var(--s2);color:var(--t2);border:1px solid var(--b);}
.mph-bio{font-size:13px;color:var(--t2);line-height:1.55;margin-top:10px;}
.mph-goals-lbl{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-top:12px;margin-bottom:4px;}
.mph-goals{font-size:13px;color:var(--t2);line-height:1.5;font-style:italic;}
.mph-li{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;color:#185FA5;text-decoration:none;}
.mact{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--b);}
.mabtn{flex:1;padding:12px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
.mabtn-pri{background:var(--a);color:#fff;}
.mabtn-sec{background:var(--s2);color:var(--t);}
.mbtn-sec{background:rgba(255,255,255,.15);color:#fff;border:none;}
.mbtn{width:100%;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;text-align:center;}

/* TOAST */
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--t);color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:24px;white-space:nowrap;opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:400;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* PREFS SHEET */
.psheet-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;pointer-events:none;}
.psheet-overlay.on{display:flex;pointer-events:all;}
.psheet{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-height:85%;overflow-y:auto;animation:su .28s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.psh-handle{width:36px;height:4px;background:var(--bs);border-radius:2px;margin:12px auto 0;}
.psh-head{padding:14px 18px 12px;border-bottom:1px solid var(--b);}
.psh-head h3{font-size:16px;font-weight:600;}
.psh-head p{font-size:13px;color:var(--t3);margin-top:3px;}
.psh-body{padding:16px 18px;}
.psh-label{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:8px;}
.pill-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bs);background:var(--s);color:var(--t2);transition:all .15s;user-select:none;}
.pill.on{background:var(--a);border-color:var(--a);color:#fff;}
.psh-save{width:100%;padding:13px;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:20px;}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-sub">NLR Summit 2026</div>
        <h1>Match</h1>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;" onclick="openPrefs()" title="Match preferences">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 5h16M6 11h10M9 17h4"/></svg>
        </div>
        <a class="hav" id="hav" href="/app"></a>
      </div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="fbar">
    <div class="fbar-row" id="type-filters">
      <div class="fc on" onclick="setTypeFilter('all',this)">All types</div>
      <div class="fc" onclick="setTypeFilter('Investor',this)">Investors</div>
      <div class="fc" onclick="setTypeFilter('Startup',this)">Startups</div>
      <div class="fc" onclick="setTypeFilter('Accelerator / Incubator',this)">Accelerators</div>
      <div class="fc" onclick="setTypeFilter('Ecosystem Partner',this)">Ecosystem</div>
      <div class="fc" onclick="setTypeFilter('Corporate',this)">Corporate</div>
    </div>
  </div>

  <!-- STACK -->
  <div class="stack-area" id="stack-area">
    <div class="hint-no" id="hint-no">PASS</div>
    <div class="hint-yes" id="hint-yes">MEET</div>
    <div class="hint-super" id="hint-super">SUPER</div>
  </div>

  <div class="stack-info" id="stack-info"></div>

  <!-- ACTION BUTTONS -->
  <div class="actions">
    <button class="act-btn btn-no" onclick="swipeCard('left')" title="Pass">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="act-btn btn-super" onclick="swipeCard('up')" title="Super interested">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 18V4M4 11l7-7 7 7"/></svg>
    </button>
    <button class="act-btn btn-yes" onclick="swipeCard('right')" title="Interested">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
  </div>

  <!-- MATCH MODAL -->
  <div class="match-modal" id="match-modal">
    <div class="match-top">
      <div class="match-avatars">
        <div class="match-av" id="mm-you"></div>
        <div class="match-icon" style="font-size:32px;line-height:1;">🫱🤝🫲</div>
        <div class="match-av" id="mm-them"></div>
      </div>
      <h2>It's a match!</h2>
      <p id="mm-text">You're both interested in meeting each other.</p>
      <button class="mbtn mbtn-sec" onclick="closeMatch()">Keep swiping</button>
    </div>
    <div class="mprofile">
      <div class="mph" id="mm-profile"></div>
      <div class="mact">
        <div class="mabtn mabtn-sec" onclick="closeMatch()">Skip</div>
        <div class="mabtn mabtn-pri" onclick="goRequest()">Send meeting request</div>
      </div>
    </div>
  </div>

  <!-- PREFS SHEET -->
  <div class="psheet-overlay" id="psheet-overlay" onclick="handlePsClick(event)">
    <div class="psheet">
      <div class="psh-handle"></div>
      <div class="psh-head">
        <h3>Match preferences</h3>
        <p>Who are you looking to meet at Summit?</p>
      </div>
      <div class="psh-body">
        <div class="psh-label">I'm looking for</div>
        <div class="pill-group" id="pref-types"></div>
        <div class="psh-label">Tech areas I'm interested in</div>
        <div class="pill-group" id="pref-sectors"></div>
        <button class="psh-save" onclick="savePrefs()">Save &amp; refresh stack</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="nb" onclick="window.location.href='/app'">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><circle cx="11" cy="11" r="2.5" fill="currentColor" stroke="none"/><path d="M11 3v2M11 17v2M3 11h2M17 11h2"/></svg>
      <span>Discover</span>
    </button>
    <button class="nb on" onclick="window.location.href='/match'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 14.5l-8 4-8-4"/><path d="M2 12l4-2 2 2 4-2 4 2 2-2 4 2"/><path d="M6 10V7l6-3 6 3v3"/></svg>
      <span>Match</span>
    </button>
    <button class="nb" onclick="window.location.href='/app'">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 6h14M4 11h9M4 16h6"/><circle cx="17" cy="16" r="3.5" fill="currentColor" stroke="none"/><path d="M17 14.5v1.5l1 1" stroke="white" stroke-width="1.2"/></svg>
      <span>Requests</span>
    </button>
    <button class="nb" onclick="window.location.href='/app'">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="16" height="15" rx="2"/><path d="M7 2v4M15 2v4M3 9h16"/></svg>
      <span>Schedule</span>
    </button>
    <button class="nb" onclick="window.location.href='/app'">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="8" r="4"/><path d="M3 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      <span>Profile</span>
    </button>
  </nav>
</div>

<script>
const TYPES=['Startup','Investor','Accelerator / Incubator','Ecosystem Partner','Corporate','Government / Policy','Nonprofit','University / Research'];
const SECTORS=['Solar','Wind','Energy Storage','Grid Technology','Hydrogen','CCUS','Electric Vehicles','Energy Efficiency','Nuclear','Biomass','Geothermal','ESG / Impact','Project Finance','Smart Buildings'];
const FIRST=['Alex','Jordan','Morgan','Taylor','Casey','Riley','Quinn','Avery','Sage','Drew','Blake','Cameron','Dana','Ellis','Finley','Harper','Jamie','Kendall','Lane','Marlowe','Parker','Reese','Sawyer','Tatum','Wren','Zara','Adrian','Brianna','Carlos','Diana','Ethan','Fiona','Gabriel','Hannah','Ivan','Julia','Kevin','Laura','Michael','Nina','Oscar','Paula','Rafael','Sofia','Thomas','Victor','Wendy','Yara','Zach','Alicia','Brandon','Claire','Derek','Elena','Frank','Grace','Hugo','Isabel','Jason','Karen','Liam','Mia','Nathan','Olivia'];
const LAST=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Wilson','Anderson','Taylor','Thomas','Moore','Martin','Jackson','Lee','Harris','Clark','Lewis','Walker','Hall','Allen','Young','King','Wright','Scott','Green','Baker','Adams','Nelson','Carter','Mitchell','Perez','Roberts','Turner','Phillips','Campbell','Evans','Edwards','Collins'];
const ORGS=['Nth Light Energy','Vectra Renewables','SolarEdge','NREL','Xcel Energy','Pivot Energy','Ampere Labs','GridPoint','Swell Energy','Sunrun','Tesla Energy','Enphase','Nexamp','Arcadia Power','Onyx Solar','Aurora Solar','EnPower','Stem Inc','Fluence','Nuvve','Eos Energy','Form Energy','Qcells','Nextracker','sPower','Sol Systems','Plug Power','Bloom Energy','Carbon Clean','Climeworks','RMI','E3','ICF','AECOM','Leidos','WSP','CDM Smith','Arup','McKinsey','BCG','Deloitte','EY','BloombergNEF'];
const BIOS=['Focused on early-stage clean energy deals across the Mountain West. Always looking for founders tackling hard grid problems.','Building software to make distributed energy resources easier to finance and deploy at scale.','Working at the intersection of policy and project finance to unlock capital for underserved clean energy markets.','Leading corporate sustainability strategy and exploring strategic investments in climate tech.','Accelerating the energy transition by connecting innovators with the capital and partnerships they need.','Running a fund focused on industrial decarbonization — CCUS, hydrogen, and long-duration storage.','Managing a portfolio of utility-scale solar and storage projects from development to operations.','Researching next-generation grid technologies and commercialization pathways out of national lab.','Helping municipalities and counties navigate the clean energy transition with pragmatic policy tools.'];
const AVCOLS=[['#c8dff5','#0d3a6e'],['#b8e8d4','#0a4a2a'],['#d8d0f5','#3a2a80'],['#f5d0c0','#6a2a10'],['#d0e8b8','#1a4a0a'],['#f5e0b0','#5a3a00'],['#f0c8d8','#5a1a30']];

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function rndS(a,n){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x.slice(0,n);}

// Load or generate attendees
let ATTS=JSON.parse(localStorage.getItem('nlr_atts')||'null');
if(!ATTS){
  ATTS=[];
  for(let i=0;i<400;i++){
    const fn=rnd(FIRST),ln=rnd(LAST);
    ATTS.push({id:i,name:`${fn} ${ln}`,org:rnd(ORGS),initials:fn[0]+ln[0],color:rnd(AVCOLS),type:rnd(TYPES),sectors:rndS(SECTORS,1+Math.floor(Math.random()*3)),bio:rnd(BIOS),lookingFor:rndS(TYPES,1+Math.floor(Math.random()*3)),interestedIn:rndS(SECTORS,2+Math.floor(Math.random()*3))});
  }
  try{localStorage.setItem('nlr_atts',JSON.stringify(ATTS));}catch(e){}
} else {
  // Ensure match fields exist
  ATTS=ATTS.map(a=>({...a,bio:a.bio||rnd(BIOS),lookingFor:a.lookingFor||rndS(TYPES,1+Math.floor(Math.random()*3)),interestedIn:a.interestedIn||rndS(SECTORS,2+Math.floor(Math.random()*3))}));
}

const ME=JSON.parse(localStorage.getItem('nlr_current')||'null');
if(!ME)location.href="/";

// Prefs: what ME is looking for
let myPrefs=JSON.parse(localStorage.getItem('nlr_match_prefs')||'null')||{lookingFor:[...TYPES],interestedIn:[...SECTORS]};
let seen=new Set(JSON.parse(localStorage.getItem('nlr_seen')||'[]'));
let liked=JSON.parse(localStorage.getItem('nlr_liked')||'[]');

let stack=[],curTypeFilter='all',curMatchAtt=null;
let isDragging=false,startX=0,startY=0,curX=0,curY=0,cardEl=null;

// ── SCORING ──
function score(att){
  let s=0;
  // Their type matches what I want
  if(myPrefs.lookingFor.includes(att.type))s+=3;
  // Sector overlap
  const secOverlap=att.sectors.filter(x=>myPrefs.interestedIn.includes(x)).length;
  s+=secOverlap*2;
  // They're looking for my type
  if(ME.type&&att.lookingFor&&att.lookingFor.includes(ME.type))s+=2;
  // Sector overlap with my sectors
  if(ME.sectors){const mySecOverlap=att.sectors.filter(x=>ME.sectors.includes(x)).length;s+=mySecOverlap;}
  return s;
}

function buildStack(){
  const area=document.getElementById('stack-area');
  // Remove old cards
  area.querySelectorAll('.card').forEach(c=>c.remove());

  let candidates=ATTS.filter(a=>a.id!==0&&!seen.has(a.id));
  if(curTypeFilter!=='all')candidates=candidates.filter(a=>a.type===curTypeFilter);
  // Sort by score desc
  candidates=candidates.map(a=>({...a,_score:score(a)})).sort((a,b)=>b._score-a._score);
  stack=candidates.slice(0,20);
  updateInfo();
  if(!stack.length){showEmpty();return;}
  // Render bottom 3 cards (top of stack last)
  const visible=stack.slice(0,3).reverse();
  visible.forEach((att,i)=>{
    const isTop=i===visible.length-1;
    const card=buildCard(att,isTop);
    const offset=(visible.length-1-i);
    card.style.transform=`translateY(${offset*6}px) scale(${1-offset*0.03})`;
    card.style.zIndex=i+1;
    area.appendChild(card);
    if(isTop)attachDrag(card,att);
  });
}

function buildCard(att,isTop){
  const[bg,fg]=att.color;
  const sc=att._score||score(att);
  const maxScore=10;
  const bars=Math.min(5,Math.round((sc/maxScore)*5));
  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=att.id;
  card.innerHTML=`
    <div class="card-photo" style="background:${bg};">
      ${att.photo?`<img src="${att.photo}" alt="">`:`<div class="card-initials" style="color:${fg};">${att.initials}</div>`}
    </div>
    <div class="score-badge">${sc} pts</div>
    <div class="card-body">
      <div class="card-name">${att.name}</div>
      <div class="card-title">${att.title||att.type}</div>
      <div class="card-org">${att.org}</div>
      <span class="card-type">${att.type}</span>
      <div class="card-sectors">${att.sectors.map(s=>`<span class="cs">${s}</span>`).join('')}</div>
      ${att.bio?`<div class="card-bio">${att.bio}</div>`:''}
      <div class="card-match">
        <span class="match-label">Match</span>
        <div class="match-bars">${Array.from({length:5},(_,i)=>`<div class="mbar${i<bars?' on':''}"></div>`).join('')}</div>
      </div>
    </div>`;
  return card;
}

function showEmpty(){
  const area=document.getElementById('stack-area');
  area.innerHTML=`<div class="hint-no" id="hint-no">PASS</div><div class="hint-yes" id="hint-yes">MEET</div><div class="hint-super" id="hint-super">SUPER</div>
  <div class="stack-empty">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><path d="M28 48S8 36 8 20a10 10 0 0 1 20 0 10 10 0 0 1 20 0c0 16-20 28-20 28z" stroke="#9a9a8e" stroke-width="2"/></svg>
    <h3>You've seen everyone</h3>
    <p>You've swiped through all available attendees matching your filters.</p>
    <button class="reset-btn" onclick="resetSeen()">Start over</button>
  </div>`;
  document.getElementById('stack-info').textContent='';
}

function updateInfo(){
  const unseen=ATTS.filter(a=>a.id!==0&&!seen.has(a.id)&&(curTypeFilter==='all'||a.type===curTypeFilter)).length;
  document.getElementById('stack-info').textContent=unseen>0?`${unseen} people to meet`:'';
}

function resetSeen(){seen=new Set();localStorage.removeItem('nlr_seen');buildStack();}

// ── SWIPE ──
function swipeCard(dir){
  const area=document.getElementById('stack-area');
  const topCard=area.querySelector('.card:last-child');
  if(!topCard)return;
  const att=stack[0];
  if(!att)return;
  topCard.classList.add('animating');
  if(dir==='left'){topCard.style.transform=`translateX(-140%) rotate(-20deg)`;topCard.style.opacity='0';}
  else if(dir==='right'){topCard.style.transform=`translateX(140%) rotate(20deg)`;topCard.style.opacity='0';}
  else if(dir==='up'){topCard.style.transform=`translateY(-140%)`;topCard.style.opacity='0';}
  setTimeout(()=>{topCard.remove();processSwipe(dir,att);},340);
}

function processSwipe(dir,att){
  seen.add(att.id);
  try{localStorage.setItem('nlr_seen',JSON.stringify([...seen]));}catch(e){}
  stack.shift();
  hideHints();
  if(dir==='right'||dir==='up'){
    liked.push({id:att.id,super:dir==='up'});
    try{localStorage.setItem('nlr_liked',JSON.stringify(liked));}catch(e){}
    // 40% chance of mutual match for demo
    const mutual=Math.random()<0.4;
    if(mutual){curMatchAtt=att;showMatchModal({...att,_score:score(att)},dir==='up');}
    else{showToast(dir==='up'?'Super request sent!':'Request sent to '+att.name.split(' ')[0]);}
  }
  // Shift remaining cards up
  const area=document.getElementById('stack-area');
  const cards=area.querySelectorAll('.card');
  cards.forEach((c,i)=>{
    const offset=(cards.length-1-i);
    c.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
    c.style.transform=`translateY(${offset*6}px) scale(${1-offset*0.03})`;
  });
  // Add new card at bottom if stack has more
  if(stack.length>=3){
    const newAtt=stack[2];
    const newCard=buildCard({...newAtt,_score:score(newAtt)},false);
    newCard.style.transform=`translateY(12px) scale(0.94)`;
    newCard.style.zIndex='1';
    newCard.style.opacity='0';
    area.insertBefore(newCard,area.querySelector('.card'));
    setTimeout(()=>{newCard.style.transition='opacity .3s';newCard.style.opacity='1';},50);
  }
  // Attach drag to new top card
  setTimeout(()=>{
    const newTop=area.querySelector('.card:last-child');
    if(newTop&&stack[0])attachDrag(newTop,stack[0]);
    updateInfo();
    if(!area.querySelector('.card'))showEmpty();
  },350);
}

// ── DRAG ──
function attachDrag(card,att){
  cardEl=card;
  card.addEventListener('mousedown',dragStart);
  card.addEventListener('touchstart',dragStart,{passive:true});
}

function dragStart(e){
  if(e.target.closest('a'))return;
  isDragging=true;
  const pt=e.touches?e.touches[0]:e;
  startX=pt.clientX;startY=pt.clientY;curX=0;curY=0;
  cardEl.style.transition='none';
  document.addEventListener('mousemove',dragMove);
  document.addEventListener('mouseup',dragEnd);
  document.addEventListener('touchmove',dragMove,{passive:true});
  document.addEventListener('touchend',dragEnd);
}

function dragMove(e){
  if(!isDragging)return;
  const pt=e.touches?e.touches[0]:e;
  curX=pt.clientX-startX;curY=pt.clientY-startY;
  const rot=curX*0.08;
  cardEl.style.transform=`translateX(${curX}px) translateY(${curY}px) rotate(${rot}deg)`;
  // Show hints
  const pct=Math.abs(curX)/120;
  const vpct=Math.abs(curY)/120;
  if(curY<-40&&Math.abs(curX)<60){
    document.getElementById('hint-super').style.opacity=Math.min(1,vpct);
    document.getElementById('hint-yes').style.opacity=0;
    document.getElementById('hint-no').style.opacity=0;
  } else if(curX>40){
    document.getElementById('hint-yes').style.opacity=Math.min(1,pct);
    document.getElementById('hint-no').style.opacity=0;
    document.getElementById('hint-super').style.opacity=0;
  } else if(curX<-40){
    document.getElementById('hint-no').style.opacity=Math.min(1,pct);
    document.getElementById('hint-yes').style.opacity=0;
    document.getElementById('hint-super').style.opacity=0;
  } else {hideHints();}
}

function dragEnd(){
  isDragging=false;
  document.removeEventListener('mousemove',dragMove);
  document.removeEventListener('mouseup',dragEnd);
  document.removeEventListener('touchmove',dragMove);
  document.removeEventListener('touchend',dragEnd);
  if(!cardEl)return;
  const velX=curX,velY=curY;
  hideHints();
  if(velY<-80&&Math.abs(velX)<80){swipeCard('up');}
  else if(velX>80){swipeCard('right');}
  else if(velX<-80){swipeCard('left');}
  else{
    cardEl.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';
    const idx=stack.length>0?0:0;
    cardEl.style.transform=`translateY(0px) scale(1)`;
  }
}

function hideHints(){
  ['hint-no','hint-yes','hint-super'].forEach(id=>document.getElementById(id).style.opacity=0);
}

// ── MATCH MODAL ──
function showMatchModal(att,isSuper){
  const modal=document.getElementById('match-modal');
  const[bg,fg]=att.color;
  const myIni=ME.initials||(ME.first?ME.first[0]+ME.last[0]:'?');

  // Avatars
  const mmYou=document.getElementById('mm-you');
  mmYou.innerHTML=ME.photo?`<img src="${ME.photo}" alt="">`:`<span style="color:#fff;">${myIni}</span>`;
  mmYou.style.background=ME.photo?'transparent':'rgba(255,255,255,.2)';
  const mmThem=document.getElementById('mm-them');
  mmThem.innerHTML=att.photo?`<img src="${att.photo}" alt="">`:`<span style="color:${fg};">${att.initials}</span>`;
  mmThem.style.background=att.photo?'transparent':bg;

  document.getElementById('mm-text').textContent=isSuper
    ?`You super-liked ${att.name.split(' ')[0]} — and they want to meet you too!`
    :`You and ${att.name.split(' ')[0]} are both interested in meeting.`;

  // Full profile sheet
  const sc=att._score||score(att);
  const maxScore=10;const bars=Math.min(5,Math.round((sc/maxScore)*5));
  const prof=document.getElementById('mm-profile');
  prof.innerHTML=`
    <div class="mph-row">
      <div class="mph-av" style="background:${bg};color:${fg};">${att.photo?`<img src="${att.photo}" alt="">`:att.initials}</div>
      <div>
        <div class="mph-name">${att.name}</div>
        <div class="mph-title">${att.title||att.type}</div>
        <div class="mph-org">${att.org}</div>
      </div>
    </div>
    <div class="mph-tags">
      <span class="mph-type">${att.type}</span>
      ${att.sectors.map(s=>`<span class="mph-sec">${s}</span>`).join('')}
    </div>
    ${att.bio?`<div class="mph-bio">${att.bio}</div>`:''}
    ${att.goals?`<div class="mph-goals-lbl">Looking for at Summit</div><div class="mph-goals">${att.goals}</div>`:''}
    ${att.linkedin?`<a class="mph-li" href="${att.linkedin}" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>LinkedIn profile</a>`:''}
    <div class="card-match" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--b);">
      <span class="match-label">Match score</span>
      <div class="match-bars">${Array.from({length:5},(_,i)=>`<div class="mbar${i<bars?' on':''}"></div>`).join('')}</div>
      <span style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;margin-left:4px;">${sc} pts</span>
    </div>`;

  modal.classList.add('on');
}

function closeMatch(){document.getElementById('match-modal').classList.remove('on');curMatchAtt=null;}

function goRequest(){
  closeMatch();
  // Store pending request and redirect to app
  if(curMatchAtt){localStorage.setItem('nlr_open_request',JSON.stringify(curMatchAtt.id));}
  location.href="/app";
}

// ── PREFS ──
function openPrefs(){
  const tp=document.getElementById('pref-types');tp.innerHTML='';
  TYPES.forEach(t=>{const d=document.createElement('div');d.className='pill'+(myPrefs.lookingFor.includes(t)?' on':'');d.textContent=t;d.onclick=()=>{if(myPrefs.lookingFor.includes(t)){myPrefs.lookingFor=myPrefs.lookingFor.filter(x=>x!==t);d.classList.remove('on');}else{myPrefs.lookingFor.push(t);d.classList.add('on');}};tp.appendChild(d);});
  const sp=document.getElementById('pref-sectors');sp.innerHTML='';
  SECTORS.forEach(s=>{const d=document.createElement('div');d.className='pill'+(myPrefs.interestedIn.includes(s)?' on':'');d.textContent=s;d.onclick=()=>{if(myPrefs.interestedIn.includes(s)){myPrefs.interestedIn=myPrefs.interestedIn.filter(x=>x!==s);d.classList.remove('on');}else{myPrefs.interestedIn.push(s);d.classList.add('on');}};sp.appendChild(d);});
  document.getElementById('psheet-overlay').classList.add('on');
}

function savePrefs(){localStorage.setItem('nlr_match_prefs',JSON.stringify(myPrefs));document.getElementById('psheet-overlay').classList.remove('on');buildStack();}
function handlePsClick(e){if(e.target===document.getElementById('psheet-overlay'))document.getElementById('psheet-overlay').classList.remove('on');}

// ── TYPE FILTER ──
function setTypeFilter(t,el){curTypeFilter=t;document.querySelectorAll('.fc').forEach(c=>c.classList.remove('on'));el.classList.add('on');buildStack();}

// ── TOAST ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

// ── INIT ──
function init(){
  const av=document.getElementById('hav');
  if(ME.photo)av.innerHTML=`<img src="${ME.photo}" alt="">`;
  else av.textContent=ME.initials||(ME.first?ME.first[0]+ME.last[0]:'?');
  buildStack();
}
init();
</script>
